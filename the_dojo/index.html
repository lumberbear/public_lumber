<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#16110d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="The Dojo">
    <title>The Dojo</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/icon-180.png">
    <link rel="icon" href="assets/app-icon.svg" type="image/svg+xml">
    <style>
      html {
        background: #16110d;
        color: #ede4d3;
        color-scheme: dark;
      }

      body {
        margin: 0;
        background: #16110d;
      }
    </style>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div class="title-block">
          <span class="brand-mark" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
              <path d="M 340 110 A 168 168 0 1 1 199 98"
                    fill="none" stroke="#c8453a" stroke-width="44" stroke-linecap="round"/>
            </svg>
          </span>
          <div class="title-text">
            <h1>The Dojo</h1>
            <p id="screen-label" class="screen-label">Exercises</p>
          </div>
        </div>
        <div class="header-actions" aria-label="Data actions">
          <button id="more-button" class="icon-button is-quiet" type="button" aria-label="More actions" aria-expanded="false">⋯</button>
          <div id="session-actions" class="session-actions" aria-label="Session actions"></div>
        </div>
      </header>

      <main id="app-root" class="app-root" tabindex="-1">
        <section class="empty-state" aria-live="polite">
          <h2>Loading</h2>
        </section>
      </main>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <dialog id="actions-dialog" class="actions-dialog">
      <form method="dialog" class="dialog-panel">
        <div class="dialog-head">
          <h2>Actions</h2>
          <button class="icon-button" type="submit" aria-label="Close actions">&times;</button>
        </div>
        <button id="export-button" class="button button-secondary" type="button">Export JSON</button>
        <label class="button button-secondary file-button">
          Import JSON
          <input id="import-input" type="file" accept="application/json,.json">
        </label>
      </form>
    </dialog>
  </body>
</html>
