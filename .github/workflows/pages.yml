name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: adventure_book/package-lock.json

      - name: Install Adventure Book dependencies
        working-directory: adventure_book
        run: npm ci

      - name: Build Adventure Book
        working-directory: adventure_book
        run: npm run build

      - name: Compose Pages artifact
        run: |
          mkdir -p _site
          rsync -a \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.claude' \
            --exclude '_site' \
            --exclude 'adventure_book' \
            ./ _site/
          mkdir -p _site/adventure_book
          cp -R adventure_book/dist/. _site/adventure_book/
          touch _site/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
